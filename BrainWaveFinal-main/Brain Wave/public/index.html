<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Login | Brain Wave</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100%;
      /* overflow: hidden; */ /* ← removed this line to make scrollable */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      color: white;
      position: relative;
      font-family: 'Poppins', sans-serif;
    }

    /* Overlay for readability */
    .overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.35);
      z-index: 0;
    }

    /* Background slides container */
    .bg-slide {
      position: fixed;
      inset: 0;
      z-index: -1;
    }

    .bg-slide img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      animation: fade 9s infinite;
    }

    .bg-slide img:nth-child(1) { animation-delay: 0s; }
    .bg-slide img:nth-child(2) { animation-delay: 3s; }
    .bg-slide img:nth-child(3) { animation-delay: 6s; }

    @keyframes fade {
      0% { opacity: 0; }
      10% { opacity: 1; }
      33% { opacity: 1; }
      43% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ✨ Glassmorphic Login Box */
    .login-box {
      position: relative;
      z-index: 10;
      width: 340px;
      margin-top: 18vh;
      background: linear-gradient(135deg, rgba(123,104,238,0.4), rgba(147,112,219,0.3));
      border-radius: 20px;
      padding: 2rem;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 15px 40px rgba(0,0,0,0.5);
      backdrop-filter: blur(12px);
      transition: all 0.4s ease;
      text-align: center;
    }

    .login-box:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 20px 60px rgba(123,104,238,0.6);
      border: 1px solid rgba(255,255,255,0.5);
    }

    .login-box h1 {
      font-size: 1.7rem;
      font-weight: 900;
      color: #f0e9ff;
      text-shadow: 0 0 15px rgba(155,135,245,0.8);
      margin-bottom: 0.5rem;
    }

    .login-box p {
      font-size: 1rem;
      color: #e5dbff;
      margin-bottom: 1rem;
    }

    .login-box input {
      background-color: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      border-radius: 10px;
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      outline: none;
      transition: all 0.3s;
    }

    .login-box input:focus {
      border-color: #c5b3ff;
      background-color: rgba(255,255,255,0.25);
      box-shadow: 0 0 12px rgba(147,112,219,0.8);
    }

    .login-box button {
      margin-top: 0.8rem;
      background: linear-gradient(135deg, #7b68ee, #a78bfa);
      color: white;
      font-weight: 700;
      letter-spacing: 0.5px;
      border: none;
      border-radius: 10px;
      width: 100%;
      padding: 0.8rem;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .login-box button:hover {
      background: linear-gradient(135deg, #8b5cf6, #c084fc);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(155,135,245,0.9);
    }

    /* Creators Section */
    .creators-title {
      margin-top: 2rem;
      text-align: center;
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1.5px;
      color: #fff0ff;
      text-shadow: 0 0 18px rgba(180, 155, 255, 0.9);
      position: relative;
      z-index: 10;
    }

    .creators-title::after {
      content: '';
      display: block;
      width: 150px;
      height: 3px;
      background: linear-gradient(90deg, #a78bfa, #c084fc, #a78bfa);
      margin: 0.5rem auto 0;
      border-radius: 2px;
    }

    .creators {
      position: relative;
      z-index: 10;
      margin-top: 1.5rem;
      display: flex;
      justify-content: center;
      gap: 3rem;
      text-align: center;
      flex-wrap: wrap;
    }

    .creator {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .creator img {
      width: 165px;
      height: 165px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.8);
      box-shadow: 0 0 30px rgba(123,104,238,0.8), 0 5px 20px rgba(0,0,0,0.5);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .creator:first-child img { transform: scale(1.12); object-position: center 60%; }
    .creator:last-child img { transform: scale(1.12); object-position: center; }

    .creator img:hover {
      transform: scale(1.2);
      box-shadow: 0 0 45px rgba(155,135,245,1), 0 8px 25px rgba(0,0,0,0.6);
    }

    .creator p {
      margin-top: 0.6rem;
      font-size: 1rem;
      font-weight: 700;
      color: #f5f0ff;
      text-shadow: 0 0 10px rgba(160, 140, 255, 0.9);
    }

  </style>
</head>

<body>
  <!-- Smooth background images -->
  <div class="bg-slide">
    <img src="images/bg1.jpg" alt="bg1">
    <img src="images/bg2.jpg" alt="bg2">
    <img src="images/cobg.jpg" alt="bg3">
  </div>

  <div class="overlay" aria-hidden="true"></div>

  <!-- 🧠 Login Box -->
  <div class="login-box text-center">
    <h1>🚀 Welcome to Brain Wave</h1>
    <p>Enter your team name</p>

    <form id="loginForm" class="space-y-3">
      <div>
        <label class="block mb-1 text-xs font-semibold">👥 Team Name</label>
        <input type="text" id="teamName" placeholder="Team name" required />
      </div>
      <button type="submit">Enter ➡️</button>
    </form>
  </div>

  <!-- ✨ Creators Section -->
  <h2 class="creators-title">✨ Creators of the Site ✨</h2>
  <div class="creators">
    <div class="creator">
      <img src="images/creator1.jpg" alt="Creator 1">
      <p>Sachin Jadhav</p>
    </div>
    <div class="creator">
      <img src="images/creator222.jpg" alt="Creator 2">
      <p>Srishti Mandre</p>
    </div>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const team = document.getElementById("teamName").value.trim();
      if(team.length > 0) {
        localStorage.setItem("teamName", team);
        localStorage.setItem("round", "0");
        localStorage.setItem("roundCompleted", "0");
        if(team.toLowerCase() === "superadmin342") {
          window.location.href = "admin-login.html";
        } else {
          window.location.href = "waiting.html";
        }
      }
    });
  </script>
</body>
</html>
