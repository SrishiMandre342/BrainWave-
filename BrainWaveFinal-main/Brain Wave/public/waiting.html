<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Waiting Room | Brain Wave</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      background: url('images/cobg.jpg') no-repeat center center fixed;
      background-size: cover;
    }

    /* Left side video */
    .bg-video {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 50%; /* video takes left half */
      height: auto;
      object-fit: cover;
      z-index: 0;
    }

    /* Right side content box */
    .content-box {
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 2.5rem 3rem;
      box-shadow: 0 0 30px rgba(0, 255, 128, 0.3);
      text-align: center;
      max-width: 480px;
      animation: fadeIn 1.5s ease-in-out;
      border: 1px solid rgba(0, 255, 128, 0.3);
      z-index: 1;
      position: absolute;
      right: 5%; /* place box at right side */
      top: 50%;
      transform: translateY(-50%);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Neon text glow effects */
    .neon-green {
      color: #39ff14;
      text-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14;
    }

    .neon-blue {
      color: #00eaff;
      text-shadow: 0 0 10px #00eaff, 0 0 20px #00eaff;
    }

    .neon-yellow {
      color: #faff00;
      text-shadow: 0 0 8px #faff00;
    }
  </style>
</head>

<body>

  <!-- Left video -->
  <video autoplay muted loop playsinline class="bg-video">
    <source src="images/bg.mp4" type="video/mp4" />
  </video>

  <!-- Right content box -->
  <div class="content-box">
    <h1 class="text-3xl font-bold mb-3 neon-green">🚀 Welcome <span id="teamNameDisplay"></span>!</h1>
    <p class="text-md text-gray-200 mb-5">
      You’re now entering the <strong>1st Round: Quiz</strong>!
    </p>
    <p class="text-md text-gray-200 mb-5">
      Get ready for an exciting set of multiple-choice questions. Stay focused, think fast, and enjoy the challenge!
    </p>
    <p class="text-yellow-300 font-semibold neon-yellow mb-3">
      ⚠️ Attention: Switching tabs or any unfair attempts will be logged and may result in disqualification.
    </p>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    document.getElementById("teamNameDisplay").textContent =
      localStorage.getItem("teamName") || "Team";

    const firebaseConfig = {
      apiKey: "AIzaSyA3n0_IA5j8rof7-zYqTHAgwhuqLQ61xL8",
      authDomain: "brainwave-337b3.firebaseapp.com",
      databaseURL: "https://brainwave-337b3-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "brainwave-337b3",
      storageBucket: "brainwave-337b3.appspot.com",
      messagingSenderId: "18955419464",
      appId: "1:18955419464:web:5fe45bd80e1674703b7d7d"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref("rounds/round1/status").on("value", snapshot => {
      if (snapshot.val() === "open") {
        window.location.href = "round1-quiz.html";
      }
    });
  </script>

</body>
</html>
