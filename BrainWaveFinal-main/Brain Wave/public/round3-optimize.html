    code: `#include <stdio.h>
int factorial(int n) {
    int fact = 1;
    int i = 1;
    while (i <= n) {
        fact = fact * i;
        i++;
    }
    return fact;
}
int main() {
    int n;
    printf("Enter a number: ");
    scanf("%d", &n);
    int sum = 0;
    int fact1 = factorial(1); int fact2 = factorial(2); int fact3 = factorial(3);
    int fact4 = factorial(4); int fact5 = factorial(5); int fact6 = factorial(6);
    int fact7 = factorial(7); int fact8 = factorial(8); int fact9 = factorial(9);
    int fact10 = factorial(10);
    if(n>=1) sum+=fact1; if(n>=2) sum+=fact2; if(n>=3) sum+=fact3;
    if(n>=4) sum+=fact4; if(n>=5) sum+=fact5; if(n>=6) sum+=fact6;
    if(n>=7) sum+=fact7; if(n>=8) sum+=fact8; if(n>=9) sum+=fact9;
    if(n>=10) sum+=fact10;
    printf("The sum of factorials up to %d is %d\\n", n, sum);
    return 0;
}`

  q: "Python — Unoptimized Example (Finding Prime Numbers and Their Sum)",
  code: `# Unoptimized Python program to find all prime numbers up to n and calculate their sum

n = int(input("Enter a number: "))
primes = []
total_sum = 0

for i in range(2, n+1):
    flag = 0
    for j in range(2, i):
        if i % j == 0:
            flag = 1
            break
    if flag == 0:
        primes.append(i)

# Calculating sum of primes (inefficient separate loop)
for p in primes:
    total_sum = total_sum + p

# Printing primes (unoptimized separate loop)
for p in primes:
    print("Prime number:", p)

print("Total prime numbers found:", len(primes))
print("Sum of all prime numbers:", total_sum)`
}

  {
    q: "C Language — Unoptimized Example (Linked List Operations)",
    code: `#include <stdio.h>
#include <stdlib.h>
struct Node {
    int data;
    struct Node* next;
};
int main() {
    struct Node* head = NULL;
    struct Node* second = NULL;
    struct Node* third = NULL;
    
    head = (struct Node*)malloc(sizeof(struct Node));
    second = (struct Node*)malloc(sizeof(struct Node));
    third = (struct Node*)malloc(sizeof(struct Node));
    
    head->data = 10; head->next = second;
    second->data = 20; second->next = third;
    third->data = 30; third->next = NULL;
    
    struct Node* current = head;
    while(current != NULL) {
        printf("Data: %d\\n", current->data);
        current = current->next;
    }
    
    // Adding a new node at end (unoptimized)
    struct Node* newNode = (struct Node*)malloc(sizeof(struct Node));
    newNode->data = 40; newNode->next = NULL;
    current = head;
    while(current->next != NULL) {
        current = current->next;
    }
    current->next = newNode;
    
    // Printing all nodes again (inefficient)
    current = head;
    while(current != NULL) {
        printf("Node value: %d\\n", current->data);
        current = current->next;
    }
    
    return 0;
}`

code: `numbers = []

const container = document.getElementById("questions-container");
questions.forEach((item,index)=>{
    const box=document.createElement("div");
    box.className="question-box";

    const p=document.createElement("p");
    p.innerHTML="<strong>"+item.q+"</strong>";

    const pre=document.createElement("pre");
    pre.textContent=item.code;

    const label=document.createElement("label");
    label.setAttribute("for","answer"+(index+1));
    label.innerHTML="<strong>Your Optimized Code:</strong>";

    const textarea=document.createElement("textarea");
    textarea.id="answer"+(index+1);
    textarea.placeholder="Write your optimized solution here...";

    const button=document.createElement("button");
    button.textContent="💾 Save";
    button.onclick=()=>saveAnswer(index+1);

    box.append(p, pre, label, textarea, button);
    container.appendChild(box);
});

function saveAnswer(qNum){
    const answer=document.getElementById("answer"+qNum).value.trim();
    if(!answer){ alert("⚠️ Please enter your code before saving!"); return; }
    db.ref("teams/"+teamName+"/round3/question"+qNum).set({answer, questionNumber:qNum})
      .then(()=>alert("✅ Answer saved for Q"+qNum))
      .catch(e=>alert("❌ Error: "+e));
}

// Volunteer Section Buttons
const selectedBtn=document.getElementById("selectedBtn");
const notSelectedBtn=document.getElementById("notSelectedBtn");

selectedBtn.onclick=()=>{
    db.ref("teams/"+teamName+"/selection").set("selected")
      .then(()=>window.location.href="waiting4.html")
      .catch(e=>alert("❌ Error: "+e));
};

notSelectedBtn.onclick=()=>{
    db.ref("teams/"+teamName+"/selection").set("not_selected")
      .then(()=>{
          alert("✅ Team marked as Not Selected");
          selectedBtn.disabled=true;
          selectedBtn.style.opacity=0.5;
          selectedBtn.style.cursor="not-allowed";
      })
      .catch(e=>alert("❌ Error: "+e));
};
// ===== TAB SWITCH DETECTION LOGIC =====
let switchCount = 0;

document.addEventListener("visibilitychange", function() {

    switchCount++;

    if (switchCount === 1) {
      alert("⚠️ Warning! You switched tabs. Do not leave the quiz window again!");
